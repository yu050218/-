<!DOCTYPE html>
<html>
<head>
    <title>Check LocalStorage</title>
</head>
<body>
    <h1>LocalStorage Check</h1>
    <div id="result"></div>
    
    <script>
        const resultDiv = document.getElementById('result');
        
        // 检查 localStorage 中的 token
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        
        resultDiv.innerHTML = `
            <h2>LocalStorage Contents:</h2>
            <p><strong>Token:</strong> ${token ? token : 'No token found'}</p>
            <p><strong>User:</strong> ${user ? user : 'No user found'}</p>
            <p><strong>Test Session ID:</strong> ${localStorage.getItem('testSessionId') ? localStorage.getItem('testSessionId') : 'No test session ID'}</p>
        `;
        
        // 列出所有 localStorage 项
        resultDiv.innerHTML += '<h2>All LocalStorage Items:</h2><ul>';
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            const value = localStorage.getItem(key);
            resultDiv.innerHTML += `<li>${key}: ${value}</li>`;
        }
        resultDiv.innerHTML += '</ul>';
    </script>
</body>
</html>
